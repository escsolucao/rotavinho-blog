<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícia - Rotavinho</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <div class="logo-icon">R</div>
                Rota<span>vinho</span>
            </a>
            <nav id="mainNav">
                <a href="index.html">Início</a>
                <a href="index.html#noticias" class="active">Notícias</a>
                <a href="videos.html">Vídeos</a>
                <a href="index.html#mercado">Mercado</a>
                <a href="admin.html">Admin</a>
            </nav>
            <button class="hamburger" id="menuToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <article class="news-detail" id="news-detail">
        <div style="text-align:center; padding: 60px; color: #777;">Carregando notícia...</div>
    </article>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Rotavinho. Todos os direitos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        async function carregarNoticia() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));

            let dados;
            try {
                const resp = await fetch('data.json');
                dados = await resp.json();
            } catch(e) {
                document.getElementById('news-detail').innerHTML = '<div style="text-align:center;padding:60px;color:#e31837;">Erro ao carregar dados.</div>';
                return;
            }

            const noticia = dados.ultimasNoticias.find(n => n.id === id);
            if (!noticia) {
                document.getElementById('news-detail').innerHTML = '<div style="text-align:center;padding:60px;color:#777;">Notícia não encontrada.</div>';
                return;
            }

            document.title = noticia.titulo + ' - Rotavinho';

            const relacionadas = dados.ultimasNoticias.filter(n => n.id !== id).slice(0, 2);

            document.getElementById('news-detail').innerHTML = `
                <span class="news-card-tag">${noticia.tag}</span>
                <h1 class="news-detail-title">${noticia.titulo}</h1>
                <div class="news-detail-meta">
                    <span>${noticia.data}</span>
                    <span>por Rotavinho</span>
                    <span>💬 ${noticia.comentarios} comentários</span>
                </div>
                <img src="${noticia.imagem}" alt="${noticia.titulo}" class="news-detail-img">
                <div class="news-detail-content">
                    <p>${noticia.resumo || 'Notícia em atualização...'}</p>
                </div>
                <div style="margin-top: 30px;">
                    <div class="section-title">
                        <h2>Notícias <span class="accent">Relacionadas</span></h2>
                    </div>
                    <div class="news-grid" style="grid-template-columns: repeat(2, 1fr);">
                        ${relacionadas.map(r => `
                            <a href="noticia.html?id=${r.id}" class="news-card">
                                <img src="${r.imagem}" alt="${r.titulo}">
                                <div class="news-card-body">
                                    <span class="news-card-tag">${r.tag}</span>
                                    <h3 class="news-card-title">${r.titulo}</h3>
                                    <div class="news-card-meta">
                                        <span>${r.data}</span>
                                        <div class="news-card-stats">
                                            <span>❤️ ${r.curtidas}</span>
                                            <span>💬 ${r.comentarios}</span>
                                        </div>
                                    </div>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        carregarNoticia();
    </script>
</body>
</html>
